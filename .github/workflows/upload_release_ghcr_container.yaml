name: Build and upload GHCR containers

on:
  release:
    types: [published]

env:
  CFENGINE_VERSION: 3.21.3

jobs:
  upload_container:
    name: Upload Containers
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    strategy:
      - name: Cache CFEngine binary
        id: cache-binary
        uses: actions/cache@v5
        with:
          path: rpm/*.rpm
          key: cache-binary

      - name: Download CFEngine
        if: steps.cache-binary.outputs.cache-hit != 'true'
        run: |
          mkdir -p "rpm/";
          for from_rockylinux in 8 9; do
            wget --quiet "https://cfengine-package-repos.s3.amazonaws.com/community_binaries/Community-${CFENGINE_VERSION}/agent_rhel${from_rockylinux}_x86_64/cfengine-community-${CFENGINE_VERSION}-1.el${from_rockylinux}.x86_64.rpm" --output-document "rpm/cfengine.el${from_rockylinux}.rpm";
          done;

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Build images
        run: |
          set -e;
          docker buildx build --output type=docker --tag ghcr.io/${{ env.REPO_LC }}/systemd/el8:${{ github.event.release.tag_name }} --tag ghcr.io/${{ env.REPO_LC }}/systemd/el8:latest -f Dockerfile.systemd --build-arg FROM_ROCKYLINUX=8 &
          docker buildx build --output type=docker --tag ghcr.io/${{ env.REPO_LC }}/systemd/el9:${{ github.event.release.tag_name }} --tag ghcr.io/${{ env.REPO_LC }}/systemd/el9:latest -f Dockerfile.systemd --build-arg FROM_ROCKYLINUX=9 &
          docker buildx build --output type=docker --tag ghcr.io/${{ env.REPO_LC }}/systemd-ipa/el8:${{ github.event.release.tag_name }} --tag ghcr.io/${{ env.REPO_LC }}/systemd-ipa/el8:latest -f Dockerfile.systemd-ipa --build-arg FROM_ROCKYLINUX=8 &
          docker buildx build --output type=docker --tag ghcr.io/${{ env.REPO_LC }}/systemd-ipa/el9:${{ github.event.release.tag_name }} --tag ghcr.io/${{ env.REPO_LC }}/systemd-ipa/el9:latest -f Dockerfile.systemd-ipa --build-arg FROM_ROCKYLINUX=9 &
          wait;
          docker push ghcr.io/${{ env.REPO_LC }}/systemd/el8 --all-tags &
          docker push ghcr.io/${{ env.REPO_LC }}/systemd/el9 --all-tags &
          docker push ghcr.io/${{ env.REPO_LC }}/systemd-ipa/el8 --all-tags &
          docker push ghcr.io/${{ env.REPO_LC }}/systemd-ipa/el9 --all-tags &
          wait;
